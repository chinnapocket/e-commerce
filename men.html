<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shrihya Fashion - Men Collection</title>

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

/* BODY */
body{
  background:#f5f6fa;
}

/* NAVBAR */
.navbar{
  background:#111;
  color:#fff;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
  position:sticky;
  top:0;
  z-index:1000;
}

.brand{
  font-size:22px;
  font-weight:bold;
  letter-spacing:1px;
}

.cart-link{
  color:white;
  text-decoration:none;
  font-size:16px;
  background:#222;
  padding:8px 12px;
  border-radius:8px;
  transition:0.3s;
}

.cart-link:hover{
  background:red;
}

/* HERO */
.hero{
  text-align:center;
  padding:30px;
  background:white;
}

.hero h1{
  font-size:32px;
}

.hero p{
  color:#555;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:25px;
  padding:25px;
}

/* CARD */
.card{
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 6px 18px rgba(0,0,0,0.1);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-6px);
}

.card img{
  width:100%;
  height:220px;
  object-fit:cover;
}

.card-body{
  padding:15px;
}

.card-body h3{
  margin-bottom:5px;
}

.price{
  color:green;
  font-weight:bold;
  margin-bottom:10px;
}

/* BUTTON */
.add-btn{
  width:100%;
  padding:10px;
  border:none;
  background:#111;
  color:white;
  cursor:pointer;
  font-size:15px;
  transition:0.3s;
}

.add-btn:hover{
  background:#e74c3c;
}

/* BADGE */
.badge{
  background:red;
  color:white;
  padding:2px 8px;
  border-radius:50%;
  font-size:12px;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="brand">Shrihya Fashion 👕</div>

  <a href="cart.html" class="cart-link">
    🛒 Cart <span id="cartCount" class="badge">0</span>
  </a>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Men's Collection</h1>
  <p>Premium fashion for modern lifestyle</p>
</div>

<!-- PRODUCTS GRID -->
<div class="grid">

  <!-- 1 -->
  <div class="card">
    <img src="men1.jpeg">
    <div class="card-body">
      <h3>Denim Jacket</h3>
      <div class="price">₹2499</div>
      <button class="add-btn" data-id="1" data-name="Denim Jacket" data-price="2499" data-image="men1.jpeg">Add to Cart</button>
    </div>
  </div>

  <!-- 2 -->
  <div class="card">
    <img src="men.jpeg">
    <div class="card-body">
      <h3>Cotton Shirt</h3>
      <div class="price">₹1299</div>
      <button class="add-btn" data-id="2" data-name="Cotton Shirt" data-price="1299" data-image="men.jpeg">Add to Cart</button>
    </div>
  </div>

  <!-- 3 -->
  <div class="card">
    <img src="blazer.jpg">
    <div class="card-body">
      <h3>Formal Blazer</h3>
      <div class="price">₹3999</div>
      <button class="add-btn" data-id="3" data-name="Formal Blazer" data-price="3999" data-image="https://source.unsplash.com/500x500/?men,blazer">Add to Cart</button>
    </div>
  </div>

  <!-- 4 -->
  <div class="card">
    <img src="blue jeans.jpg">
    <div class="card-body">
      <h3>Blue Jeans</h3>
      <div class="price">₹1599</div>
      <button class="add-btn" data-id="4" data-name="Blue Jeans" data-price="1599" data-image="https://source.unsplash.com/500x500/?men,jeans">Add to Cart</button>
    </div>
  </div>

  <!-- 5 -->
  <div class="card">
    <img src="combo.jpg">
    <div class="card-body">
      <h3>T-Shirt Combo</h3>
      <div class="price">₹999</div>
      <button class="add-btn" data-id="5" data-name="T-Shirt Combo" data-price="999" data-image="https://source.unsplash.com/500x500/?tshirt,men">Add to Cart</button>
    </div>
  </div>

  <!-- 6 -->
  <div class="card">
    <img src="hoodie.jpg">
    <div class="card-body">
      <h3>Winter Hoodie</h3>
      <div class="price">₹1899</div>
      <button class="add-btn" data-id="6" data-name="Winter Hoodie" data-price="1899" data-image="https://source.unsplash.com/500x500/?hoodie,men">Add to Cart</button>
    </div>
  </div>

  <!-- 7 -->
  <div class="card">
    <img src="shoe.jpg">
    <div class="card-body">
      <h3>Sport Shoes</h3>
      <div class="price">₹2999</div>
      <button class="add-btn" data-id="1" data-name="Denim Jacket" data-price="2499" data-image="men1.jpeg">Add to Cart</button>

    </div>
  </div>

  <!-- 8 -->
  <div class="card">
    <img src="smartwatch.webp">
    <div class="card-body">
      <h3>Smart Watch</h3>
      <div class="price">₹3499</div>
      <button class="add-btn" data-id="8" data-name="Smart Watch" data-price="3499" data-image="https://source.unsplash.com/500x500/?watch,men">Add to Cart</button>
    </div>
  </div>

</div>

<!-- SCRIPT -->
<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* UPDATE CART COUNT */
function updateCartCount(){
  document.getElementById("cartCount").textContent =
  cart.reduce((sum,item)=>sum+item.quantity,0);
}

/* ADD TO CART */
document.querySelectorAll(".add-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{

    const product = {
      id: btn.dataset.id,
      name: btn.dataset.name,
      price: Number(btn.dataset.price),
      image: btn.dataset.image,
      quantity: 1
    };

    let existing = cart.find(i=>i.id===product.id);

    if(existing){
      existing.quantity++;
    }else{
      cart.push(product);
    }

    localStorage.setItem("cart",JSON.stringify(cart));
    updateCartCount();

    alert("Added to cart ✅");
  });
});

updateCartCount();

</script>

</body>
</html>
