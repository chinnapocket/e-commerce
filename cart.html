<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Cart - Shrihya Fashion</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f8;
}

header{
    background:#111;
    color:white;
    padding:15px 25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header a{
    color:white;
    text-decoration:none;
}

.container{
    max-width:1200px;
    margin:30px auto;
    padding:20px;
}

.cart-item{
    background:white;
    border-radius:12px;
    padding:15px;
    margin-bottom:15px;
    display:flex;
    gap:20px;
    align-items:center;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.cart-item img{
    width:120px;
    height:120px;
    object-fit:cover;
    border-radius:10px;
}

.item-details{
    flex:1;
}

.item-details h3{
    margin-bottom:10px;
}

.price{
    color:green;
    font-weight:bold;
}

.controls{
    margin-top:10px;
}

.controls button{
    padding:8px 12px;
    border:none;
    cursor:pointer;
    border-radius:5px;
}

.qty-btn{
    background:#111;
    color:white;
}

.remove-btn{
    background:red;
    color:white;
    margin-left:10px;
}

.summary{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
    margin-top:20px;
}

.total{
    font-size:24px;
    font-weight:bold;
    margin-top:15px;
}

.action-btn{
    margin-top:15px;
    padding:12px 20px;
    border:none;
    cursor:pointer;
    border-radius:6px;
}

.clear-btn{
    background:red;
    color:white;
}

.shop-btn{
    background:#111;
    color:white;
    text-decoration:none;
    display:inline-block;
}

.empty{
    text-align:center;
    padding:50px;
    font-size:20px;
    color:#666;
}
</style>
</head>
<body>

<header>
    <h2>🛒 Shopping Cart</h2>
    <a href="index.html">🏠 Home</a>
    <h2>🛒 Shopping Cart</h2>
    <a href="men.html"></a>
    <h2>🛒 Shopping Cart</h2>
    <a href="women.html"></a>
</header>

<div class="container">

    <div id="cartItems"></div>

    <div class="summary">
        <h2>Order Summary</h2>

        <div class="total">
            Total: ₹<span id="totalAmount">0</span>
        </div>

        <button class="action-btn clear-btn" id="clearCart">
            Clear Cart
        </button>

        <a href="index.html" class="action-btn shop-btn">
            Continue Shopping
        </a>
    </div>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function saveCart(){
    localStorage.setItem("cart",JSON.stringify(cart));
    renderCart();
}

function increaseQty(id){
    const item = cart.find(i => i.id === id);
    if(item){
        item.quantity++;
        saveCart();
    }
}

function decreaseQty(id){
    const item = cart.find(i => i.id === id);

    if(item){
        item.quantity--;

        if(item.quantity <= 0){
            cart = cart.filter(i => i.id !== id);
        }

        saveCart();
    }
}

function removeItem(id){
    cart = cart.filter(i => i.id !== id);
    saveCart();
}

function renderCart(){

    const cartItems = document.getElementById("cartItems");
    const totalAmount = document.getElementById("totalAmount");

    if(cart.length === 0){
        cartItems.innerHTML =
        `<div class="empty">Your Cart is Empty 🛍️</div>`;
        totalAmount.textContent = "0";
        return;
    }

    let total = 0;

    cartItems.innerHTML = cart.map(item => {

        let itemTotal = item.price * item.quantity;
        total += itemTotal;

        return `
        <div class="cart-item">

            <img src="${item.image}" alt="${item.name}">

            <div class="item-details">
                <h3>${item.name}</h3>

                <div class="price">
                    ₹${item.price}
                </div>

                <p>Quantity: ${item.quantity}</p>

                <div class="controls">

                    <button class="qty-btn"
                    onclick="decreaseQty('${item.id}')">
                    -
                    </button>

                    <button class="qty-btn"
                    onclick="increaseQty('${item.id}')">
                    +
                    </button>

                    <button class="remove-btn"
                    onclick="removeItem('${item.id}')">
                    Remove
                    </button>

                </div>

            </div>

        </div>
        `;
    }).join("");

    totalAmount.textContent = total;
}

document.getElementById("clearCart")
.addEventListener("click", () => {

    cart = [];
    saveCart();

});

renderCart();

</script>

</body>
</html>
